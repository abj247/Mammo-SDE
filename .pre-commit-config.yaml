# Pre-commit hooks run on `git commit`.
# Tests are intentionally NOT run here for low commit latency — CI runs them.
# To run manually across all files: `pre-commit run --all-files`
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pinned to match the ruff version in .github/workflows/ci.yml so local
    # pre-commit and CI lint always produce identical results.
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: ^(tests/|outputs/|notebooks/)
      - id: ruff-format
        exclude: ^(tests/|outputs/|notebooks/)
